# ======================================================
# NOMBRE DE LA APLICACION
# ======================================================
spring.application.name=main

# ======================================================
# CONFIGURACION DE POSTGRESQL
# ======================================================

# URL de conexi n:
# jdbc:postgresql://localhost:5432/saasrrhh
#
# localhost  -> tu PC
# 5432       -> puerto por defecto PostgreSQL
# saasrrhh   -> nombre de la base de datos
spring.datasource.url=jdbc:postgresql://localhost:5432/SaaSRRHH

# Usuario de PostgreSQL
spring.datasource.username=postgres

# Contrase a de PostgreSQL
spring.datasource.password=12345678

# Driver JDBC para PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver

# ======================================================
# CONFIGURACION JPA / HIBERNATE
# ======================================================

# Dialecto SQL para PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# update:
# crea y actualiza tablas autom ticamente
#
# create:
# BORRA TODO y vuelve a crear
#
# create-drop:
# borra al cerrar la app
#
# validate:
# solo valida estructura
spring.jpa.hibernate.ddl-auto=update

# Mostrar SQL en consola
spring.jpa.show-sql=true

# Formatear SQL bonito
spring.jpa.properties.hibernate.format_sql=true

# Resaltar SQL en colores
spring.jpa.properties.hibernate.highlight_sql=true

# ======================================================
# LOGS SQL
# ======================================================

# Mostrar consultas SQL
logging.level.org.hibernate.SQL=DEBUG

# Mostrar par metros enviados
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# ======================================================
# ZONA HORARIA
# ======================================================

spring.jpa.properties.hibernate.jdbc.time_zone=America/Lima

# ======================================================
# OPEN-IN-VIEW
# ======================================================

# Evita problemas ocultos con Lazy Loading
spring.jpa.open-in-view=false