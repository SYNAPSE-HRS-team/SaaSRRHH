<div class="documento-form">
  <div class="header">
    <h1>📄 Nuevo Documento</h1>
    <a routerLink="/documentos" class="btn-secondary">← Volver</a>
  </div>

  @if (cargandoCatalogos()) {
    <p class="estado">Cargando empleados y tipos de documento...</p>
  } @else {
    <form (ngSubmit)="onSubmit()" class="form-card">

      @if (error()) {
        <div class="alerta error">{{ error() }}</div>
      }
      @if (successMessage()) {
        <div class="alerta success">{{ successMessage() }}</div>
      }

      <div class="campo">
        <label>Empleado *</label>
        <select [(ngModel)]="empleadoId" name="empleadoId" required>
          <option [ngValue]="null" disabled>Selecciona un empleado</option>
          @for (emp of empleados; track emp.id) {
            <option [ngValue]="emp.id">{{ emp.nombres }} {{ emp.apellidos }}</option>
          }
        </select>
      </div>

      <div class="campo">
        <label>Tipo de documento *</label>
        <select [(ngModel)]="tipoId" name="tipoId" (ngModelChange)="onTipoChange()" required>
          <option [ngValue]="null" disabled>Selecciona un tipo</option>
          @for (tipo of tipos; track tipo.idTipo) {
            <option [ngValue]="tipo.idTipo">{{ tipo.nombre }}</option>
          }
          <option [ngValue]="OPCION_NUEVO_TIPO">➕ Crear nuevo tipo...</option>
        </select>
      </div>

      @if (mostrandoNuevoTipo) {
        <div class="nuevo-tipo-box">
          <div class="campo">
            <label>Nombre del nuevo tipo *</label>
            <input type="text" [(ngModel)]="nuevoTipoNombre" name="nuevoTipoNombre"
                   placeholder="Ej: Constancia de trabajo" />
          </div>

          <div class="nuevo-tipo-acciones">
            <button type="button" class="btn-secondary-btn" (click)="cancelarNuevoTipo()">
              Cancelar
            </button>
            <button type="button" class="btn-primary-small" (click)="crearNuevoTipo()" [disabled]="creandoTipo()">
              {{ creandoTipo() ? 'Creando...' : 'Crear tipo' }}
            </button>
          </div>
        </div>
      }

      <div class="campo">
        <label>Fecha de vencimiento (opcional)</label>
        <input type="date" [(ngModel)]="fechaVencimiento" name="fechaVencimiento" />
      </div>

      <div class="campo">
        <label>Archivo *</label>
        <input type="file" (change)="onFileChange($event)" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx" required />
        @if (nombreArchivo) {
          <p class="archivo-info">Seleccionado: {{ nombreArchivo }}</p>
        }
      </div>

      <button type="submit" class="btn-primary" [disabled]="subiendoArchivo() || guardando()">
        @if (subiendoArchivo()) {
          Subiendo archivo...
        } @else if (guardando()) {
          Guardando...
        } @else {
          Guardar documento
        }
      </button>
    </form>
  }
