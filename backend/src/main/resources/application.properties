# ======================================================
# NOMBRE DE LA APLICACION
# ======================================================
spring.application.name=main

# ======================================================
# CONFIGURACION DE POSTGRESQL (RENDER)
# ======================================================
spring.web.resources.static-locations=classpath:/static/,classpath:/public/,file:uploads/
spring.web.resources.add-mappings=true

# URL directa (con jdbc: al inicio)
spring.datasource.url=jdbc:postgresql://dpg-d9c713nlk1mc739b0dv0-a.oregon-postgres.render.com/saasrrhh

# Tu usuario real de Render
spring.datasource.username=saasrrhh_user

# Tu contraseña real de Render
spring.datasource.password=aAL4eu7wamkL80jITX1HvwZnobr13p8a

spring.datasource.driver-class-name=org.postgresql.Driver

# ======================================================
# CONFIGURACION JPA / HIBERNATE
# ======================================================
# update: crea y actualiza tablas automáticamente
spring.jpa.hibernate.ddl-auto=update

# Mostrar SQL en consola
spring.jpa.show-sql=true

# Formatear SQL bonito
spring.jpa.properties.hibernate.format_sql=true

# Resaltar SQL en colores
spring.jpa.properties.hibernate.highlight_sql=true

# ======================================================
# LOGS SQL
# ======================================================
# Mostrar consultas SQL
logging.level.org.hibernate.SQL=DEBUG

# Mostrar parámetros enviados
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# ======================================================
# ZONA HORARIA
# ======================================================
spring.jpa.properties.hibernate.jdbc.time_zone=America/Lima

# ======================================================
# OPEN-IN-VIEW
# ======================================================
# Evita problemas ocultos con Lazy Loading
spring.jpa.open-in-view=false

# ======================================================
# CONFIGURACIÓN SEGURIDAD JWT
# ======================================================
# Clave secreta JWT (Base64)
jwt.secret=dGhpc2lzYXZlcnlsb25nc2VjcmV0a2V5Zm9yand0dXNlMTIz

# Expiración del token en milisegundos (24 horas)
jwt.expiration=86400000

# ======================================================
# SUBIDA DE ARCHIVOS
# ======================================================
file.upload-dir=uploads/documentos
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
