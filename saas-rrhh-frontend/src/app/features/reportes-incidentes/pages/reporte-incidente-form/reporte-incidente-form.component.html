<div class="reporte-incidente-form">
  <div class="page-header">
    <h1>{{ getTitulo() }}</h1>
    <div class="header-actions">
      <button class="btn btn-secondary" (click)="cancelar()">⬅️ Volver</button>
    </div>
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="loading-spinner">
    <div class="spinner"></div>
    <p>Cargando...</p>
  </div>

  <!-- Error -->
  <div *ngIf="error" class="error-message">
    <p>❌ {{ errorMessage }}</p>
    <button class="btn btn-secondary" (click)="error = false">Cerrar</button>
  </div>

  <!-- Formulario -->
  <form *ngIf="!loading" [formGroup]="form" (ngSubmit)="onSubmit()" class="form-container">
    <div class="form-grid">
      <!-- Campo: Empleado ID -->
      <div class="form-group">
        <label for="empleadoId">Empleado *</label>
        <input
          type="number"
          id="empleadoId"
          formControlName="empleadoId"
          placeholder="ID del empleado"
          [class.invalid]="f['empleadoId'].invalid && submitted"
        />
        <div class="error-text" *ngIf="f['empleadoId'].invalid && submitted">
          <span *ngIf="f['empleadoId'].errors?.['required']">El empleado es obligatorio</span>
        </div>
      </div>

      <!-- Campo: Supervisor ID -->
      <div class="form-group">
        <label for="supervisorId">Supervisor</label>
        <input
          type="number"
          id="supervisorId"
          formControlName="supervisorId"
          placeholder="ID del supervisor"
        />
      </div>

      <!-- Campo: Tarea ID -->
      <div class="form-group">
        <label for="tareaId">Tarea Asignada</label>
        <input type="number" id="tareaId" formControlName="tareaId" placeholder="ID de la tarea" />
      </div>

      <!-- Campo: Área ID -->
      <div class="form-group">
        <label for="areaId">Área de Trabajo</label>
        <input type="number" id="areaId" formControlName="areaId" placeholder="ID del área" />
      </div>

      <!-- Campo: Tipo de Incidente -->
      <div class="form-group">
        <label for="tipo">Tipo de Incidente *</label>
        <select id="tipo" formControlName="tipo" [class.invalid]="f['tipo'].invalid && submitted">
          <option value="">Seleccione un tipo</option>
          <option *ngFor="let tipo of tiposIncidente" [value]="tipo">{{ tipo }}</option>
        </select>
        <div class="error-text" *ngIf="f['tipo'].invalid && submitted">
          <span *ngIf="f['tipo'].errors?.['required']">El tipo es obligatorio</span>
        </div>
      </div>

      <!-- Campo: Nivel de Riesgo -->
      <div class="form-group">
        <label for="nivelRiesgo">Nivel de Riesgo</label>
        <select id="nivelRiesgo" formControlName="nivelRiesgo">
          <option value="">Seleccione un nivel</option>
          <option *ngFor="let nivel of nivelesRiesgo" [value]="nivel">{{ nivel }}</option>
        </select>
      </div>

      <!-- Campo: Estado -->
      <div class="form-group">
        <label for="estado">Estado</label>
        <select id="estado" formControlName="estado">
          <option value="">Seleccione un estado</option>
          <option *ngFor="let estado of estadosIncidente" [value]="estado">{{ estado }}</option>
        </select>
      </div>

      <!-- Campo: Fecha del Incidente -->
      <div class="form-group">
        <label for="fechaIncidente">Fecha del Incidente *</label>
        <input
          type="datetime-local"
          id="fechaIncidente"
          formControlName="fechaIncidente"
          [class.invalid]="f['fechaIncidente'].invalid && submitted"
        />
        <div class="error-text" *ngIf="f['fechaIncidente'].invalid && submitted">
          <span *ngIf="f['fechaIncidente'].errors?.['required']">La fecha es obligatoria</span>
        </div>
      </div>
    </div>

    <!-- Campo: Descripción (ocupa toda la fila) -->
    <div class="form-group full-width">
      <label for="descripcion">Descripción *</label>
      <textarea
        id="descripcion"
        formControlName="descripcion"
        rows="4"
        placeholder="Describa detalladamente el incidente"
        [class.invalid]="f['descripcion'].invalid && submitted"
      ></textarea>
      <div class="field-info">
        <span class="char-count">{{ f['descripcion'].value?.length || 0 }}/1000</span>
        <div class="error-text" *ngIf="f['descripcion'].invalid && submitted">
          <span *ngIf="f['descripcion'].errors?.['required']">La descripción es obligatoria</span>
          <span *ngIf="f['descripcion'].errors?.['maxlength']">Máximo 1000 caracteres</span>
        </div>
      </div>
    </div>

    <!-- Campo: URL de Evidencia -->
    <div class="form-group full-width">
      <label for="evidenciaUrl">URL de Evidencia</label>
      <input
        type="url"
        id="evidenciaUrl"
        formControlName="evidenciaUrl"
        placeholder="https://ejemplo.com/evidencia.jpg"
        [class.invalid]="f['evidenciaUrl'].invalid && submitted"
      />
      <div class="error-text" *ngIf="f['evidenciaUrl'].invalid && submitted">
        <span *ngIf="f['evidenciaUrl'].errors?.['maxlength']">Máximo 500 caracteres</span>
      </div>
    </div>

    <!-- Botones de acción -->
    <div class="form-actions">
      <button type="button" class="btn btn-secondary" (click)="cancelar()">Cancelar</button>
      <button type="submit" class="btn btn-primary" [disabled]="loading">
        {{ esEdicion ? 'Actualizar' : 'Guardar' }}
      </button>
    </div>
  </form>
</div>
